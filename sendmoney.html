<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wallet - Enviar Dinero</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body {
      padding: 30px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Enviar Dinero</h2>
    <form>
      <div class="form-group">
        <label for="searchContact">Buscar en la agenda de transferencias:</label>
        <input type="text" class="form-control" id="ingresecontacto" placeholder="Ingresar contacto">
      </div>
      <button popovertarget="popup" class="btn btn-success">Agregar nuevo contacto</button>
 <h3>Contactos</h3>
  <ul id="contactList" class="list-group">
    <li class="list-group-item">
      <div class="contact-info">
        <span class="contact-name">Fox Mulder</span>
        <span class="contact-details">CBU: 130064051, Alias: fox.mulder, Banco: ITAU</span>
      </div>
    </li>
    <li class="list-group-item">
      <div class="contact-info">
        <span class="contact-name">Dana Scully</span>
        <span class="contact-details">CBU: 134128550, Alias: dana.scully, Banco: BCI</span>
      </div>
    </li>
      <button type="submit" class="btn btn-warning">Enviar dinero</button>
    </form>
    <a href="menu.html" class="btn btn-info">Volver al Menú Principal</a>
  </div>
  <br> <br>
<div popover id="popup">
  <form id="form-contactonuevo">
      <div class="form-group">
        <label for="nombre">Contacto:</label>
        <input type="text" class="form-control" id="nombre" placeholder="Ingresar Nombre y Apellido" required> <br>
      </div>
      <div class="form-group">
        <label for="cbu">CBU:</label>
        <input type="number" class="form-control" id="cbu" placeholder="Ingresar CBU" maxlength="9"required> <br>
      </div>
      <div class="form-group">
        <label for="alias">Alias:</label>
        <input type="text" class="form-control" id="alias" placeholder="Ingresar Alias" required> <br>
      </div>
      <div class="form-group">
        <label for="banco">Banco:</label>
        <input type="text" class="form-control" id="banco" placeholder="Ingresar Banco" required> <br>
      </div>
      <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
  <button popovertarget="popup" popovertargetaction="hide">Cerrar</button>
</div>

 <script src="assets/js/sendmoney.js"  type="text/javascript"></script>
</body>
</html>
