<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wallet - Login</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body {
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <form id="form-login">
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" class="form-control" id="email" placeholder="Ingresar correo electrónico">
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" class="form-control" id="password" placeholder="Ingresar Contraseña">
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <a href="menu.html" class="btn btn-secondary d-none">Ir al Menú Principal</a>
  </div>
  <script src="assets/js/index.js"  type="text/javascript"></script>
</body>
</html>
